version: '3.8'

services:
  backend:
    build: .  # Tells Docker to look for your Dockerfile in this folder
    container_name: spring-backend
    depends_on:
      - postgres-db
      - redis-cache
    environment:
    - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/mydb
    - SPRING_DATASOURCE_USERNAME=postgres
    - SPRING_DATASOURCE_PASSWORD=admin
    - SPRING_DATA_REDIS_HOST=redis-cache
    - SPRING_DATA_REDIS_PORT=6379
  
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"     # Opens standard HTTP port to the world
      # - "443:443" # We will uncomment this when you add Cloudflare SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend 
  postgres-db:
    image: postgis/postgis:15-3.4-alpine
    shm_size: '256mb'
    container_name: postgres-db
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

volumes:
  postgres_data: # This ensures your database isn't deleted if the container restarts
